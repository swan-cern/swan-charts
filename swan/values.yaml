#
# CVMFS access
# - We deploy a cluster-wide storage driver for CVMFS, provided by the
#   Kubernetes team at CERN (https://gitlab.cern.ch/kubernetes/storage/cvmfs-csi).
#   This solution is based on automounting.
#
cvmfs-csi:
  enabled: true
  automountHostPath: /var/cvmfs
  automountStorageClass:
    create: true

#
# EOS access
# - We deploy a cluster-wide storage driver for EOS, provided by the
#   Kubernetes team at CERN (https://gitlab.cern.ch/kubernetes/storage/eosxd-csi).
#   This solution is based on automounting.
#
eosxd-csi:
  enabled:  &eosEnabled true
  automountHostPath: /var/eos
  commonStorageClass:
    enabled: true
  extraConfigMaps:
    eos-csi-dir-etc-auto-master-d:
      # /etc/auto.master.d/eos.autofs
      eos.autofs: |
        /eos /etc/eos/auto.eos
      # /etc/auto.master.d/eos.squashfs.autofs
      eos.squashfs.autofs: |
        /eos/squashfs program:/sbin/auto.eos.squashfs
      # per-letter views under /eos/user and /eos/project
      eos.user.autofs: |
        /eos/user /etc/eos/auto.user
      eos.project.autofs: |
        /eos/project /etc/eos/auto.project
    eos-csi-dir-etc-eos:
      # Ensure file versions are shown to allow notebook checkpoints (hide-versions option is added)
      fuse.home-i00.conf: |
        {"name":"home-i00","hostport":"eoshome-i00.cern.ch","remotemountdir":"/eos/user/","bind":"d l n t z","auth":{"ssskeytab":"/etc/eos.keytab"},"options":{"hide-versions":0}}
      fuse.home-i01.conf: |
        {"name":"home-i01","hostport":"eoshome-i01.cern.ch","remotemountdir":"/eos/user/","bind":"a g j k w","auth":{"ssskeytab":"/etc/eos.keytab"},"options":{"hide-versions":0}}
      fuse.home-i02.conf: |
        {"name":"home-i02","hostport":"eoshome-i02.cern.ch","remotemountdir":"/eos/user/","bind":"h o r s y","auth":{"ssskeytab":"/etc/eos.keytab"},"options":{"hide-versions":0}}
      fuse.home-i03.conf: |
        {"name":"home-i03","hostport":"eoshome-i03.cern.ch","remotemountdir":"/eos/user/","bind":"b e m v x","auth":{"ssskeytab":"/etc/eos.keytab"},"options":{"hide-versions":0}}
      fuse.home-i04.conf: |
        {"name":"home-i04","hostport":"eoshome-i04.cern.ch","remotemountdir":"/eos/user/","bind":"c f i p q u","auth":{"ssskeytab":"/etc/eos.keytab"},"options":{"hide-versions":0}}
      fuse.project-i00.conf: |
        {"name":"project-i00","hostport":"eosproject-i00.cern.ch","remotemountdir":"/eos/project/","bind":"a e j g v k q y","auth":{"ssskeytab":"/etc/eos.keytab"},"options":{"hide-versions":0}}
      fuse.project-i01.conf: |
        {"name":"project-i01","hostport":"eosproject-i01.cern.ch","remotemountdir":"/eos/project/","bind":"l h b p s f w n o","auth":{"ssskeytab":"/etc/eos.keytab"},"options":{"hide-versions":0}}
      fuse.project-i02.conf: |
        {"name":"project-i02","hostport":"eosproject-i02.cern.ch","remotemountdir":"/eos/project/","bind":"d c i r m t u x z","auth":{"ssskeytab":"/etc/eos.keytab"},"options":{"hide-versions":0}}
      auto.eos: |
        ams -fstype=eosx,fsname=ams  :eosxd
        atlas -fstype=eosx,fsname=atlas  :eosxd
        cms -fstype=eosx,fsname=cms  :eosxd
        experiment -fstype=eosx,fsname=experiment  :eosxd
        geant4 -fstype=eosx,fsname=geant4  :eosxd
        lhcb -fstype=eosx,fsname=lhcb  :eosxd
        theory -fstype=eosx,fsname=theory  :eosxd
        web -fstype=eosx,fsname=web  :eosxd
        workspace -fstype=eosx,fsname=workspace  :eosxd

        # EOS instance-letter mappings are defined in their respective
        # client configs in /etc/eos.

        home-i00 -fstype=eosx,fsname=home-i00  :eosxd
        home-i01 -fstype=eosx,fsname=home-i01  :eosxd
        home-i02 -fstype=eosx,fsname=home-i02  :eosxd
        home-i03 -fstype=eosx,fsname=home-i03  :eosxd
        home-i04 -fstype=eosx,fsname=home-i04  :eosxd

        home-d -symlink :/eos/home-i00/d
        home-l -symlink :/eos/home-i00/l
        home-n -symlink :/eos/home-i00/n
        home-t -symlink :/eos/home-i00/t
        home-z -symlink :/eos/home-i00/z

        home-a -symlink :/eos/home-i01/a
        home-g -symlink :/eos/home-i01/g
        home-j -symlink :/eos/home-i01/j
        home-k -symlink :/eos/home-i01/k
        home-w -symlink :/eos/home-i01/w

        home-h -symlink :/eos/home-i02/h
        home-o -symlink :/eos/home-i02/o
        home-r -symlink :/eos/home-i02/r
        home-s -symlink :/eos/home-i02/s
        home-y -symlink :/eos/home-i02/y

        home-b -symlink :/eos/home-i03/b
        home-e -symlink :/eos/home-i03/e
        home-m -symlink :/eos/home-i03/m
        home-v -symlink :/eos/home-i03/v
        home-x -symlink :/eos/home-i03/x

        home-c -symlink :/eos/home-i04/c
        home-f -symlink :/eos/home-i04/f
